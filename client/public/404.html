<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SchoolBase</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Redirects all 404s back to index.html so the client-side router can handle them.
      // The path is preserved via sessionStorage so the router can restore it.
      var segmentCount = 1; // number of path segments in the repo name (/school-dashboard)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
